<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kicsim ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>

/* =====================
   BASE
===================== */
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Playfair Display', serif;
  background: radial-gradient(circle at top, #120014, #000);
  color:white;
  overflow-x:hidden;
}

/* =====================
   INTRO
===================== */
.intro-overlay{
  position:fixed;
  inset:0;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:9999;
}

.intro-title{
  font-size:60px;
  letter-spacing:4px;
}

.intro-btn{
  margin-top:20px;
  padding:12px 25px;
  border:none;
  border-radius:30px;
  background:#ff2d75;
  color:white;
  cursor:pointer;
}

/* hide */
.hide{
  animation:fadeOut 1.5s forwards;
}

@keyframes fadeOut{
  to{opacity:0;visibility:hidden;}
}

/* =====================
   STARS
===================== */
.stars{
  position:fixed;
  inset:0;
  z-index:-1;
}

.star{
  position:absolute;
  width:1px;
  height:1px;
  background:white;
  border-radius:50%;
  animation:twinkle 3s infinite;
}

@keyframes twinkle{
  0%,100%{opacity:0.2}
  50%{opacity:1}
}

/* =====================
   SCENE
===================== */
.scene{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
  opacity:0;
  transition:2s ease;
}

.scene.show{opacity:1;}

/* =====================
   GALLERY
===================== */
.gallery{
  padding:80px 20px;
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:12px;
}

.card{
  border-radius:14px;
  overflow:hidden;
  transform:translateY(40px);
  opacity:0;
  transition:1s ease;
}

.card.show{
  transform:translateY(0);
  opacity:1;
}

.card img{
  width:100%;
  aspect-ratio:1/1;
  object-fit:cover;
}

/* =====================
   BOTTOM HEART CTA
===================== */
.bottom-cta{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:8px;
  z-index:1000;
}

.cta-text{
  font-size:13px;
  opacity:0.8;
}

.cta-heart{
  font-size:50px;
  cursor:pointer;
  animation:pulse 1.5s infinite;
}

@keyframes pulse{
  0%{transform:scale(1)}
  50%{transform:scale(1.2)}
  100%{transform:scale(1)}
}

/* =====================
   LETTER OVERLAY
===================== */
.overlay{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.9);
  opacity:0;
  pointer-events:none;
  transition:1s ease;
}

.overlay.show{
  opacity:1;
  pointer-events:auto;
}

.letter{
  width:360px;
  height:260px;
  background:white;
  border-radius:14px;
  position:relative;
  transform:scale(0.6);
  opacity:0;
  transition:1s ease;
  padding:20px;
  color:#111;
}

.overlay.show .letter{
  transform:scale(1);
  opacity:1;
}

/* typewriter */
.letter-content{
  font-size:15px;
  line-height:1.5;
  white-space:pre-wrap;
}

/* close */
.close{
  position:absolute;
  top:10px;
  right:12px;
  font-size:20px;
  color:#ff2d75;
  cursor:pointer;
  font-weight:bold;
}

/* =====================
   CANVAS
===================== */
canvas{
  position:fixed;
  inset:0;
  pointer-events:none;
}

</style>
</head>

<body>

<!-- INTRO -->
<div class="intro-overlay" id="intro">
  <div class="intro-title">KICSIM ❤️</div>
  <button class="intro-btn" onclick="startExperience()">▶ Indítás</button>
</div>

<!-- STARS -->
<div class="stars" id="stars"></div>

<!-- SCENE -->
<div class="scene" id="scene">
  <h1>Kicsim ❤️</h1>
  <p>Ma 16 éves lettél...</p>
</div>

<!-- GALLERY -->
<div class="gallery" id="gallery">

  <div class="card"><img src="images/kep1.jpg"></div>
  <div class="card"><img src="images/kep2.jpg"></div>
  <div class="card"><img src="images/kep3.jpg"></div>
  <div class="card"><img src="images/kep4.jpg"></div>

  <div class="card"><img src="images/kep5.jpg"></div>
  <div class="card"><img src="images/kep6.jpg"></div>
  <div class="card"><img src="images/kep7.jpg"></div>
  <div class="card"><img src="images/kep8.jpg"></div>

  <div class="card"><img src="images/kep9.jpg"></div>
  <div class="card"><img src="images/kep10.jpg"></div>
  <div class="card"><img src="images/kep11.jpg"></div>
  <div class="card"><img src="images/kep12.jpg"></div>

  <div class="card"><img src="images/kep13.jpg"></div>
  <div class="card"><img src="images/kep14.jpg"></div>
  <div class="card"><img src="images/kep15.jpg"></div>
  <div class="card"><img src="images/kep16.jpg"></div>

  <div class="card"><img src="images/kep17.jpg"></div>
  <div class="card"><img src="images/kep18.jpg"></div>
  <div class="card"><img src="images/kep19.jpg"></div>
  <div class="card"><img src="images/kep20.jpg"></div>

</div>

<!-- 💖 BOTTOM HEART CTA -->
<div class="bottom-cta">
  <div class="cta-text">Görgess és nyomj a szívre a levélhez!</div>
  <div class="cta-heart" onclick="openLetter()">❤️</div>
</div>

<!-- LETTER -->
<div class="overlay" id="overlay">
  <div class="letter">

    <div class="close" onclick="closeLetter()">✖</div>
    <div class="letter-content" id="text"></div>

  </div>
</div>

<!-- MUSIC -->
<audio id="song" loop>
  <source src="music.mp3">
</audio>

<canvas id="c"></canvas>

<script>

/* =====================
   STARS
===================== */
const stars=document.getElementById("stars");

for(let i=0;i<80;i++){
  let s=document.createElement("div");
  s.className="star";
  s.style.top=Math.random()*100+"%";
  s.style.left=Math.random()*100+"%";
  stars.appendChild(s);
}

/* =====================
   SOUND
===================== */
const song=document.getElementById("song");
song.volume=0;

function startExperience(){

  document.getElementById("intro").classList.add("hide");

  song.play();

  let v=0;
  const up=setInterval(()=>{
    if(v<0.7){
      v+=0.02;
      song.volume=v;
    } else clearInterval(up);
  },80);

  startTimeline();
}

/* =====================
   TIMELINE
===================== */
function startTimeline(){

  setTimeout(()=>scene.classList.add("show"),1000);
  setTimeout(()=>gallery.classList.add("show"),4000);

  setTimeout(()=>{
    document.querySelectorAll(".card").forEach((c,i)=>{
      setTimeout(()=>c.classList.add("show"),i*80);
    });
  },4500);
}

/* =====================
   TYPEWRITER LETTER
===================== */
const message =
`Kicsim ❤️

Ez a pillanat rólad szól.
És minden benne rólad mesél.

Minden mosolyod,
minden pillanatod...

különleges.

Boldog 16. születésnapot ❤️`;

function openLetter(){
  document.getElementById("overlay").classList.add("show");

  const text=document.getElementById("text");
  text.innerHTML="";

  let i=0;

  function type(){
    if(i<message.length){
      text.innerHTML+=message.charAt(i);
      i++;
      setTimeout(type,30);
    }else{
      confetti();
    }
  }

  setTimeout(type,400);
}

/* =====================
   CLOSE
===================== */
function closeLetter(){
  document.getElementById("overlay").classList.remove("show");
}

/* =====================
   CONFETTI
===================== */
function confetti(){
  const canvas=document.getElementById("c");
  const ctx=canvas.getContext("2d");

  canvas.width=innerWidth;
  canvas.height=innerHeight;

  let parts=[];

  for(let i=0;i<250;i++){
    parts.push({
      x:Math.random()*canvas.width,
      y:Math.random()*canvas.height,
      r:Math.random()*5+2,
      v:Math.random()*3+1
    });
  }

  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle="#ff2d75";

    parts.forEach(p=>{
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fill();
      p.y+=p.v;
      if(p.y>canvas.height)p.y=0;
    });

    requestAnimationFrame(draw);
  }

  draw();
}

</script>

</body>
</html>
